      context: ./enterprise-rag-guardrails
    env_file:
      - ./enterprise-rag-guardrails/.env.example
    ports:
      - '4011:4011'

  data-quality-observability:
    build:
      context: ./data-quality-observability
    env_file:
      - ./data-quality-observability/.env.example
    ports:
