openapi: 3.1.0
info:
  title: Visual ETL Builder AI API
  version: 1.0.0
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service healthy
  /templates:
    get:
      summary: List pipeline templates
      responses:
        '200':
          description: Template catalog
  /suggest:
    post:
      summary: Suggest a pipeline from natural language
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
      responses:
        '200':
          description: Suggested pipeline structure
  /compile:
    post:
      summary: Compile a pipeline into SQL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: SQL output and validation metadata