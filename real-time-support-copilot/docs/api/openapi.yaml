openapi: 3.1.0
info:
  title: Real-Time Support Copilot API
  version: 1.0.0
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service healthy
  /knowledge:
    get:
      summary: List demo knowledge articles
      responses:
        '200':
          description: Knowledge catalog
  /assist:
    post:
      summary: Generate support suggestions for an interaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                customerId:
                  type: string
                message:
                  type: string
      responses:
        '200':
          description: Suggested reply, actions, and citations